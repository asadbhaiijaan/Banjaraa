<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asad Bhaijaan Banjara Jadugar</title>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffb6c1,#ff69b4);
  margin:0;
  padding:20px;
  overflow:hidden;
}

.container{
  max-width:500px;
  margin:auto;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

input,textarea,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  background:#ff1493;
  color:white;
  border:none;
  font-weight:bold;
  font-size:18px;
}

.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(255,20,147,0.85);
  z-index:999;
}

.popup-box{
  width:80%;
  max-width:420px;
  background:white;
  color:#111;
  text-align:center;
  padding:28px;
  border-radius:24px;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
  animation: popIn .5s ease;
}

.popup-box h2{
  font-family: Georgia, serif;
  font-size:28px;
  margin-bottom:14px;
}

.popup-box p{
  font-family: "Trebuchet MS", cursive;
  font-size:20px;
  line-height:1.5;
}

.ok-btn{
  margin-top:20px;
  padding:12px 22px;
  border:none;
  border-radius:12px;
  background:#ff1493;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

@keyframes popIn{
  from{transform:scale(0.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>Asad Bhaijaan Banjara Jadugar</h1>
    <form id="jobForm">
      <input type="text" id="name" placeholder="Name" required>
      <input type="text" placeholder="Father Name" required>
      <textarea placeholder="Address" required></textarea>
      <input type="text" placeholder="Aadhaar Number" required>
      <input type="tel" placeholder="Mobile Number" required>
      <button type="submit">Confirm & Submit</button>
    </form>
  </div>
</div>

<div id="successOverlay" class="overlay">
  <div class="popup-box">
    <h2 id="successName"></h2>
    <p>Thank You! Your Form Has Been Submitted To Asad</p>
    <button class="ok-btn" onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const overlay=document.getElementById("successOverlay");
const successName=document.getElementById("successName");
const form=document.getElementById("jobForm");

form.addEventListener("submit",function(e){
  e.preventDefault();
  const name=document.getElementById("name").value;
  successName.innerText=`🎉 Congratulations ${name} 🎉`;
  overlay.style.display="flex";
});

function closePopup(){
  overlay.style.display="none";
}
</script>

</body>
</html>
