<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asad Bhaijaan Banjara Jadugar</title>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffb6c1,#ff69b4);
  margin:0;
  padding:20px;
  overflow:hidden;
}

.floating-bg{
  position:fixed;
  inset:0;
  z-index:-1;
}

.balloon{
  position:absolute;
  bottom:-60px;
  font-size:35px;
  animation: floatUp linear forwards;
}

@keyframes floatUp{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-110vh);opacity:0;}
}

.container{
  max-width:500px;
  margin:auto;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

input,textarea,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  background:#ff1493;
  color:white;
  border:none;
  font-weight:bold;
  font-size:18px;
}

.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(255,20,147,0.95);
  color:white;
  z-index:999;
  text-align:center;
}

.overlay h1{
  font-size:48px;
  font-weight:900;
  text-shadow:0 4px 10px rgba(0,0,0,0.25);
  animation: popText 0.8s ease;
}

@keyframes popText{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.overlay-balloon{
  position:absolute;
  bottom:-40px;
  font-size:40px;
  animation: flyCongrats 10s linear forwards;
}

@keyframes flyCongrats{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-110vh);opacity:0;}
}
</style>
</head>
<body>

<div class="floating-bg" id="floatingBg"></div>

<div class="container">
  <div class="card">
    <h1>Asad Bhaijaan Banjara Jadugar</h1>
    <form id="jobForm">
      <input type="text" id="name" placeholder="Name" required>
      <input type="text" placeholder="Father Name" required>
      <textarea placeholder="Address" required></textarea>
      <input type="text" placeholder="Aadhaar Number" required>
      <input type="tel" placeholder="Mobile Number" required>
      <input type="file" required>
      <input type="file" required>
      <button type="submit">Confirm & Submit</button>
    </form>
  </div>
</div>

<div id="successOverlay" class="overlay">
  <h1 id="successName"></h1>
</div>

<script>
const overlay=document.getElementById("successOverlay");
const successName=document.getElementById("successName");
const form=document.getElementById("jobForm");
const floatingBg=document.getElementById("floatingBg");

form.addEventListener("submit",function(e){
  e.preventDefault();

  const name=document.getElementById("name").value;
  successName.innerText=`🎉 Congratulations ${name} 🎉`;
  overlay.style.display="flex";

  for(let i=0;i<15;i++){
    const balloon=document.createElement("div");
    balloon.classList.add("overlay-balloon");
    balloon.innerText="🎈";
    balloon.style.left=Math.random()*100+"%";
    overlay.appendChild(balloon);

    setTimeout(()=>{balloon.remove();},10000);
  }

  setTimeout(()=>{
    overlay.style.display="none";
  },10000);
});

function createBalloon(){
  const balloon=document.createElement("div");
  balloon.classList.add("balloon");
  balloon.innerText="🎈";
  balloon.style.left=Math.random()*100+"%";
  balloon.style.animationDuration=(4+Math.random()*3)+"s";

  floatingBg.appendChild(balloon);

  setTimeout(()=>{
    balloon.remove();
  },7000);
}

setInterval(createBalloon,500);
</script>

</body>
</html>
