<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asad Bhaijaan Jagudar ke yha chaprasi</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffb6c1,#ff69b4);
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:20px;
}

input, textarea, button, label{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:14px;
  border:1px solid #ccc;
  font-size:16px;
}

textarea{
  min-height:100px;
  resize:none;
}

button{
  background:#ff1493;
  color:white;
  border:none;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin-top:18px;
}

button:hover{
  opacity:0.9;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  z-index:999;
}

.popup{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:80%;
  max-width:350px;
}

.popup button{
  margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>Asad Bhaijaan Banjara Jadugar</h1>

    <form id="jobForm">
      <input type="text" id="name" placeholder="Name" required>
      <input type="text" placeholder="Father Name" required>
      <textarea placeholder="Address" required></textarea>
      <input type="text" placeholder="Aadhaar Number" required>
      <input type="tel" placeholder="Mobile Number" required>
      
      <label>12th Result / Marksheet Upload</label>
      <input type="file" required>

      <label>Photo Upload</label>
      <input type="file" accept="image/*" required>

      <button type="submit">Confirm & Submit</button>
    </form>
  </div>
</div>

<div class="overlay" id="popup">
  <div class="popup">
    <h2 id="message"></h2>
    <p>Thank you! Your form has been submitted AB AAP ASAD BHAIJAAN KE CHAPRASI HO GYE.</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const form = document.getElementById("jobForm");
const popup = document.getElementById("popup");
const message = document.getElementById("message");

form.addEventListener("submit", function(e){
  e.preventDefault();
  let name = document.getElementById("name").value;
  message.innerText = "🎉 Congratulations " + name + " 🎉";
  popup.style.display = "flex";
});

function closePopup(){
  popup.style.display = "none";
}
</script>

</body>
</html>
